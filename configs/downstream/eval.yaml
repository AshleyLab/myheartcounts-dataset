# Root config for the Hydra-driven downstream (health-prediction) evaluation CLI.
#
# Compose: each group below picks one preset YAML under its directory. Override
# on the CLI, e.g.:
#   mhc-downstream-eval method=xgboost
#   mhc-downstream-eval --multirun method=linear,mae,xgboost
#   mhc-downstream-eval method=mae data.data_dir=/path output.predictions_dir=preds/
#
# (SLURM dispatch via the shared eval_hydra Submitit launcher is a follow-up;
#  add the launcher package + `hydra/launcher=...` then, mirroring mhc-impute-eval.)

defaults:
  - data: default
  - method: linear
  - evaluation: default
  - output: default
  - _self_

seed: 42

hydra:
  run:
    dir: ${output.results_dir}/${now:%Y%m%d_%H%M%S}_${method.type}
  sweep:
    dir: ${output.results_dir}/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${method.type}__${hydra.job.num}
  job:
    chdir: false
