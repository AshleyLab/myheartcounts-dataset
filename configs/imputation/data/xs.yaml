# @package data
# Small subset for smoke tests. Points at the default openmhc cache layout
# (``~/.cache/openmhc/data/processed/daily_hf``). Override
# ``data.daily_hf_dir`` on the CLI when the dataset lives elsewhere.
daily_hf_dir: ${oc.env:MHC_DATA_DIR,${oc.env:HOME}/.cache/openmhc/data}/processed/daily_hf
version: xs
max_samples_per_split: 64
batch_size: 64
num_workers: 0
num_eval_workers: 1
n_days: 1
