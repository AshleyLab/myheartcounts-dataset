# Forecasting (Track 3) paper-pipeline sweep.
#
# Consumed by scripts/paper_results/forecasting/run_paper_pipeline.py.
#
# `models` is the PRE-SPECIFIED expected set: the pipeline selects exactly these
# (ignoring any extra model dirs present under the run label) and ERRORS if any
# expected model's metrics are missing. Each entry:
#   name       - output label == model.name == discovery key
#   type       - Hydra model group (configs/forecasting/model/<type>.yaml)
#   release_dir- optional bundle path -> model.release_dir= (finetuned / retrained)
#   overrides  - optional extra Hydra dot-key strings for mhc-forecast-eval

run_label: forecasting_full_20260609
runs_root: results/forecasting_eval/simurgh
output_root: results/forecasting_eval/simurgh/summary/forecasting_full_20260609

baseline: seasonal_naive
continuous_metrics: [mae]
binary_metrics: [auprc]
aggregation_unit: user

# Phase 0 (mhc-forecast-eval) overrides applied to every model.
common_overrides: []

# Phase 3 — paired user-level bootstrap CIs for skill score + mean rank, and
# (when fairness: true) the disparity-ratio fairness skill score (point + CIs).
bootstrap:
  enabled: true
  n_boot: 1000
  seed: 42
  ci_level: 0.95
  splits: [test]
  age_bins: [18, 30, 40, 50, 60]
  fairness: true
  # Demographics (age via birth_year, sex via BiologicalSex) default to
  # <dataset_root>/labels/{last_labels,enrollment_info}.json, resolved from
  # MHC_DATA_DIR. Uncomment to override:
  # labels_path: /path/to/last_labels.json
  # enrollment_path: /path/to/enrollment_info.json

models:
  - {name: seasonal_naive, type: seasonal_naive}
  - {name: seasonal_naive_average_history, type: seasonal_naive_average_history}
  - {name: autoARIMA, type: autoARIMA}
  - {name: autoETS, type: autoETS}
  - {name: chronos2_zeroshot, type: chronos2}
  - name: chronos2_finetuned
    type: chronos2
    release_dir: releases-fc/openmhc-chronos2-fc   # verify path before a real Phase-0 run
  - name: toto_zeroshot
    type: toto
    overrides: [model.toto.context_length=2048]
  - name: toto_finetuned
    type: toto
    release_dir: releases-fc/openmhc-toto-fc        # verify path before a real Phase-0 run
    overrides: [model.toto.context_length=2048]
  - name: toto_zeroshot_ctx4096
    type: toto
    overrides: [model.toto.context_length=4096]
  - name: toto_finetuned_ctx4096
    type: toto
    release_dir: releases-fc/openmhc-toto-fc
    overrides: [model.toto.context_length=4096]
  - name: dlinear
    type: dlinear
    release_dir: results/forecasting_train/simurgh/releases/dlinear_20260609_024228
  - name: mixlinear
    type: mixlinear
    release_dir: results/forecasting_train/simurgh/releases/mixlinear_20260609_025728
  - name: segrnn
    type: segrnn
    release_dir: results/forecasting_train/simurgh/releases/segrnn_20260609_031230
