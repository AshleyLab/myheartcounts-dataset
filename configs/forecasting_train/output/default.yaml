# @package output
# saving_path: PyPOTS' own per-run dir (it appends <YYYYMMDD_THHMMSS>/<MODEL>.pypots).
# release_dir: openmhc release bundle (manifest + checkpoint + scaler stats +
#              training_config.json). When null, the runner derives <saving_path>_release.
saving_path: models/forecasting_pypots
model_saving_strategy: best
release_dir: null

wandb_enabled: true
wandb_project: mhc-forecasting
wandb_entity: null
upload_wandb_artifact: false
