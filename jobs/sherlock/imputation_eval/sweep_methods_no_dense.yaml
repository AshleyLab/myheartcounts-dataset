# 16-method sweep (no lsm2_weekly dense) — sibling of sweep_methods.yaml for
# producing a backward-compatible bootstrap reference that matches the existing
# HF leaderboard's method pool. Output_root is distinct so the 17-method run
# in paper/ isn't clobbered.
#
# Consumed by:
#   scripts/paper_results/imputation/run_paper_pipeline.py \
#       --sweep-config jobs/sherlock/imputation_eval/sweep_methods_no_dense.yaml \
#       --skip-eval

output_root: ${SCRATCH_RUN_ROOT}/openmhc-imputation-eval/paper_no_dense
runs_root:   ${SCRATCH_RUN_ROOT}/openmhc-imputation-eval/runs
draws_path:  ${SCRATCH_RUN_ROOT}/openmhc-imputation-eval/paper_no_dense/bootstrap_draws.parquet
# Pooled per_user_errors.parquet (BCa LOO substrate; METRICS.md §S7). Phase 1
# writes it here, Phase 2 fairness reads it from here. Omitting this key makes
# run_paper_pipeline.py pass --no-per-user-errors to Phase 1, which then breaks
# Phase 2 fairness (--bca defaults to true and needs this file).
per_user_errors_path: ${SCRATCH_RUN_ROOT}/openmhc-imputation-eval/paper_no_dense/per_user_errors.parquet
manifest_path: ${SCRATCH_RUN_ROOT}/openmhc-imputation-eval/paper_no_dense/bootstrap_method_dirs.json

common_overrides:
  - data.version=full
  - data.daily_hf_dir=${MHC_CACHE}/processed/daily_hf
  - data.split_file=${MHC_CACHE}/splits/sharable_users_seed42_2026.json
  - +masking.masks_file=${SCRATCH_RUN_ROOT}/openmhc-imputation-eval/masks/sharable_users_seed42_2026_max91d
  - seed=42

# Phase 1
n_boot: 1000
seed: 42
splits: [test]
include_fairness: true
include_auc: true
age_bins: [18, 30, 40, 50, 60]
exclude_unknown: false

# Phase 2
baseline_method: locf
clip_lower: 0.01
clip_upper: 100.0
lambda_fairness: 0.5
fairness_combine: linear_penalty
ci_level: 0.95
disparity_fns: []
method_filter: null

methods:
  - {name: mean}
  - {name: mode}
  - {name: locf}
  - {name: linear}
  - {name: temporal_mean}
  - {name: temporal_mode}
  - {name: personalized_mean}
  - {name: personalized_mode}
  - {name: personalized_temporal_mean}
  - name: brits
    overrides: ["method.release_dir=${RELEASES}/brits"]
  - name: dlinear
    overrides: ["method.release_dir=${RELEASES}/dlinear"]
  - name: dlinear_weekly
    overrides: ["method.release_dir=${RELEASES}/dlinear-7day"]
  - name: fedformer
    overrides: ["method.release_dir=${RELEASES}/fedformer"]
  - name: timesnet
    overrides: ["method.release_dir=${RELEASES}/timesnet"]
  - name: lsm2
    overrides: ["method.release_dir=${RELEASES}/lsm2"]
  - name: lsm2_weekly_sparse
    overrides: ["method.release_dir=${RELEASES}/lsm2_weekly_sparse"]
  # lsm2_weekly (dense 7-day) deliberately omitted here. See sweep_methods.yaml
  # for the 17-method variant.
