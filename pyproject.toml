[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openmhc"
version = "0.1.0"
description = "OpenMHC: evaluation API for the MyHeartCounts wearable benchmark"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "MyHeartCounts Datasets & Benchmarks team" },
]
dependencies = [
  "datasets",
  "h5py",
  "joblib",
  "matplotlib",
  "mord",
  "numpy",
  "pandas",
  "pyarrow",
  "scikit-learn",
  "scipy",
  "statsmodels",
  "torch",
  "tqdm",
  "xgboost",
]

[project.optional-dependencies]
dev = [
  "jupyterlab",
  "ipywidgets",
  "pytest",
  "ruff",
]
pypots = [
  "pypots>=0.7",
]
lsm2 = [
  "pytorch-lightning>=2.0",
]
hf = [
  "huggingface_hub>=0.20",
]
hydra = [
  "hydra-core>=1.3",
  "omegaconf>=2.3",
  "hydra-submitit-launcher>=1.2",
]
wandb = [
  "wandb>=0.16",
]
# Every runtime feature in one shot (all tracks + Hydra CLIs + W&B logging).
# Add ``dev`` for contributor tooling: ``pip install -e ".[all,dev]"``.
all = [
  "openmhc[pypots,lsm2,hf,hydra,wandb]",
]

[project.scripts]
mhc-impute-eval = "imputation_evaluation.hydra.cli:main"
mhc-impute-train = "imputation_training.hydra.cli:main"
mhc-forecast-eval = "forecasting_evaluation.hydra.cli:main"
# mhc-downstream-eval is deferred: the public ``downstream_evaluation`` package
# ships configs + ``create_model`` but no runner yet (orchestration lives in
# the private repo). The Hydra pattern from the other two tracks is ready
# to drop in once a public ``run_eval`` exists.

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.package-data]
"eval_hydra" = ["configs/**/*.yaml"]

[tool.setuptools.packages.find]
where = ["src"]
include = [
  "context*",
  "data*",
  "devices*",
  "downstream_evaluation*",
  "imputation_evaluation*",
  "imputation_training*",
  "forecasting_evaluation*",
  "eval_hydra*",
  "labels*",
  "openmhc*",
  "utils*",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "D"]
ignore = ["E501"]

[tool.ruff.lint.pydocstyle]
convention = "google"
