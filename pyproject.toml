[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openmhc"
version = "0.1.0"
description = "OpenMHC: evaluation API for the MyHeartCounts wearable benchmark"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "MyHeartCounts Datasets & Benchmarks team" },
]
dependencies = [
  "datasets",
  "h5py",
  "joblib",
  "matplotlib",
  "mord",
  "numpy",
  "pandas",
  "polars",
  "pyarrow",
  "scikit-learn",
  "scipy",
  "statsmodels",
  "torch",
  "tqdm",
  "xgboost",
]

[project.optional-dependencies]
dev = [
  "jupyterlab",
  "ipywidgets",
  "pytest",
  "ruff",
]
hydra = [
  "hydra-core>=1.3",
  "omegaconf>=2.3",
]

[project.scripts]
# Downstream (health-prediction) Hydra CLI — the prediction-track twin of
# mhc-impute-eval / mhc-forecast-eval. Requires the [hydra] extra.
mhc-downstream-eval = "downstream_evaluation.hydra.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = [
  "context*",
  "data*",
  "downstream_evaluation*",
  "eval_hydra*",
  "imputation_evaluation*",
  "labels*",
  "openmhc*",
  "utils*",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "D"]
ignore = ["E501"]

[tool.ruff.lint.pydocstyle]
convention = "google"
